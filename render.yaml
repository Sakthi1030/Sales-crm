services:
  - type: web
    name: nexus-crm
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm run render-build
    preDeployCommand: npm --prefix backend run seed
    startCommand: npm run render-start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: nexus-crm-db
    databaseName: nexus_crm
    user: nexus_crm_user
    plan: free
    region: singapore
